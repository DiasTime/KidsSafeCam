name: camera_app
description: AI Baby Monitor — Camera app (runs on the baby-side device).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  ai_baby_monitor_shared:
    path: ../shared
  firebase_core: ^4.11.0
  firebase_app_check: ^0.4.5
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  # Local preview + media capture for streaming (Step 6). Shared pins the
  # version; this exposes RTCVideoView/RTCVideoRenderer to the camera UI.
  flutter_webrtc: ^1.5.2
  # On-device AI — YAMNet (TFLite) cry detection. tflite_flutter is FFI-based
  # (mobile/desktop, no web), so the detector is behind a conditional import and
  # the web build falls back to a no-op stub.
  tflite_flutter: ^0.11.0
  # Raw 16 kHz mono PCM stream feeding the YAMNet classifier.
  record: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/yamnet.tflite
    - assets/models/yamnet_class_map.csv
