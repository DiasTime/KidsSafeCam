name: camera_app
description: AI Baby Monitor — Camera app (runs on the baby-side device).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  ai_baby_monitor_shared:
    path: ../shared
  firebase_core: ^3.6.0
  firebase_app_check: ^0.3.2+10
  flutter_riverpod: ^2.6.1
  go_router: ^14.3.0
  # Local preview + media capture for streaming (Step 6). Shared pins the
  # version; this exposes RTCVideoView/RTCVideoRenderer to the camera UI.
  flutter_webrtc: ^0.12.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
