name: parent_app
description: AI Baby Monitor — Parent app (watch, listen, talk back, get alerts).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  ai_baby_monitor_shared:
    path: ../shared
  firebase_core: ^4.11.0
  firebase_app_check: ^0.4.5
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  # Remote video rendering for the live-view screen (Step 6). Shared pins the
  # version; this exposes RTCVideoView/RTCVideoRenderer to the parent UI.
  flutter_webrtc: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
