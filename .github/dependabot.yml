version: 2

updates:
  # ── Cloud Functions (npm) ─────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend/functions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      functions-deps:
        patterns: ["*"]

  # ── Firestore rules tooling (npm) ─────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend/firestore
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      firestore-deps:
        patterns: ["*"]

  # ── Flutter / Dart packages (pub) ─────────────────────────────────────
  - package-ecosystem: pub
    directory: /apps/shared
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dart-deps:
        patterns: ["*"]

  - package-ecosystem: pub
    directory: /apps/parent_app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dart-deps:
        patterns: ["*"]

  - package-ecosystem: pub
    directory: /apps/camera_app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dart-deps:
        patterns: ["*"]

  # ── GitHub Actions workflow versions ──────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
