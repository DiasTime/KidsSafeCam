name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # Dart / Flutter: static analysis across all packages + shared unit tests.
  # ----------------------------------------------------------------------------
  flutter:
    name: Flutter analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          channel: stable
          cache: true

      # Run the packages directly rather than via Melos: the repo's legacy
      # melos.yaml can't drive `melos bootstrap` from a global install on
      # Melos 3+, and Dart 3.5 (Flutter 3.24.3) predates pub workspaces. The
      # app packages depend on `shared` by path, so a plain `pub get` resolves
      # everything. `shared` is the only package with tests.
      - name: Get dependencies (shared)
        working-directory: apps/shared
        run: flutter pub get

      - name: Analyze & test shared
        working-directory: apps/shared
        run: |
          flutter analyze
          flutter test

      - name: Analyze parent_app
        working-directory: apps/parent_app
        run: |
          flutter pub get
          flutter analyze

      - name: Analyze camera_app
        working-directory: apps/camera_app
        run: |
          flutter pub get
          flutter analyze

  # ----------------------------------------------------------------------------
  # Firestore security rules: emulator-based allow/deny matrix (14 tests).
  # ----------------------------------------------------------------------------
  firestore-rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/firestore
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/firestore/package-lock.json

      # The Firestore emulator runs on the JVM.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Run rules tests (emulator)
        run: npm test

  # ----------------------------------------------------------------------------
  # Cloud Functions: lint + emulator-based pairing/TURN logic tests (10 tests).
  # ----------------------------------------------------------------------------
  functions:
    name: Cloud Functions lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/functions/package-lock.json

      # `test:emulator` boots the Firestore emulator (JVM) before the tests.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run function tests (emulator)
        run: npm run test:emulator
